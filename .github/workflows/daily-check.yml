name: Daily Check
on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: "Analyse the codebase and check for any issues or bugs. Generate a summary of the issues and bugs."
          claude_args: "--model opus"