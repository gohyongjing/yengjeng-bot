name: Daily Check
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Check for issues
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: "Analyse the codebase and check for any issues or bugs. Generate a summary of the issues and bugs."
          show_full_output: true
permissions:
  id-token: write
